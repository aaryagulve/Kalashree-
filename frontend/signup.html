<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Kalashree Sangeet Gurukul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
  <link rel="stylesheet" href="signup.css" />
</head>
<body>
  <div class="page">
    <div class="left">
      <div class="left-inner">
        <div class="brand">
          <p class="brand-name">Kalashree</p>
          <p class="brand-sub">Sangeet Gurukul</p>
        </div>
        <div class="left-center">
          <div class="clef-bg">𝄞</div>
          <h1 class="left-heading">Join our<br /><em>musical family.</em></h1>
          <div class="short-line"></div>
          <p class="left-sub">Start your journey into Indian Classical Music</p>
        </div>
        <div class="tanpura-wrap">
          <img src="tanpura.png" alt="Tanpura" class="tanpura-img" />
        </div>
        <p class="raga-names">Raag Yaman &nbsp;·&nbsp; Raag Bhairav &nbsp;·&nbsp; Raag Darbari</p>
      </div>
    </div>
    <div class="right">
      <a href="landing.html" class="back-link">&#8592; Back to Home</a>
      <div class="form-card">
        <div class="form-top">
          <div class="form-icon">𝄢</div>
          <h2 class="form-title">Create Account</h2>
          <p class="form-subtitle">Register as a new student</p>
        </div>
        <div class="field">
          <label for="name">Full Name</label>
          <div class="input-wrap">
            <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="name" placeholder="Priya Sharma" required />
          </div>
        </div>
        <div class="field">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="email" placeholder="you@example.com" required />
          </div>
        </div>
        <div class="field">
          <label for="password">Choose Password</label>
          <div class="input-wrap">
            <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" placeholder="••••••••" required />
          </div>
        </div>
        <button class="login-btn" id="signup-btn" onclick="handleSignup()">
          <span id="btn-text">Register Now</span>
        </button>
        <p class="signup-hint">Already have an account? <a href="login.html" style="color:#D4A017; font-weight:600; text-decoration:none;">Login here</a></p>
      </div>
      <p class="footer-text">Kalashree Sangeet Gurukul &copy; 2025</p>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="signup.js"></script>
</body>
</html>
