<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Practice | Kalashree Sangeet Gurukul</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="teacher-common.css" />
  <link rel="stylesheet" href="teacher-homework.css" />
</head>
<body>

<div class="page">
  <div class="main">
    <div class="topbar">
      <div>
        <h1 class="page-title">Review Practice</h1>
        <p class="page-subtitle">Listen to student submissions and provide feedback</p>
      </div>
      <div class="topbar-right">
        <p class="today-date" id="headerDate">18 March 2026</p>
        <p class="today-day" id="headerDay">Wednesday</p>
      </div>
    </div>

    <!-- HOMEWORK LIST SECTION -->
    <div class="hw-container">
      <div class="hw-list-header">
        <h2 class="section-title" style="margin-bottom:0; border-bottom:none; padding-bottom:0;">Recent Submissions</h2>
        <div class="hw-filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="pending">Pending Review</button>
          <button class="filter-btn" data-filter="reviewed">Reviewed</button>
        </div>
      </div>
      
      <div id="hwGrid" class="hw-grid">
        <p class="loading-text">Loading student submissions...</p>
      </div>
    </div>

  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <img src="logo-img.avif" alt="Kalashree Sangeet Gurukul" class="logo-img" />
      <p class="logo-name">Kalashree Sangeet Gurukul</p>
    </div>
    <div class="sidebar-profile">
      <div class="profile-avatar">A</div>
      <div>
        <p class="profile-name">Teacher</p>
        <p class="profile-role">Teacher</p>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="teacher-dashboard.html" class="nav-link">Dashboard</a>
      <a href="teacher-students.html" class="nav-link">Student Management</a>
      <a href="teacher-attendance.html" class="nav-link">Attendance</a>
      <a href="teacher-fee.html" class="nav-link">Fee Management</a>
      <a href="teacher-homework.html" class="nav-link active">Review Practice</a>
      <a href="teacher-feedback.html" class="nav-link">Feedback</a>
      <a href="teacher-events.html" class="nav-link">Events</a>
    </nav>
    <div class="sidebar-bottom">
      <a href="login.html" class="logout-btn">Logout</a>
    </div>
  </div>
</div>

<script src="auth-ui.js"></script>
<script src="teacher-homework.js"></script>
</body>
</html>
